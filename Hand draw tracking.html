<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HandDraw Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#09090d;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#wrap{width:100%;height:100%;display:flex;justify-content:center;align-items:center}
canvas{display:block;border-radius:16px;box-shadow:0 0 80px rgba(0,0,0,.95)}
/* HUD */
#hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(6,6,10,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);padding:7px 18px;border-radius:999px;z-index:20;pointer-events:none}
.hlbl{font-size:10px;color:#333;letter-spacing:.5px;text-transform:uppercase}
.badge{padding:3px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.8px;transition:all .2s}
.bi{background:rgba(255,255,255,.07);color:#444}
.bd{background:rgba(80,220,130,.17);color:#50dc82;border:1px solid rgba(80,220,130,.3)}
.be{background:rgba(255,80,80,.17);color:#ff5a5a;border:1px solid rgba(255,80,80,.3)}
.bg{background:rgba(240,165,40,.17);color:#f0a828;border:1px solid rgba(240,165,40,.3)}
#hcnt,#repind{font-size:11px}
#hcnt{color:#2a2a35}
#repind{color:#f0a828;display:none}
#repind.on{display:block}
/* Palette */
#pal{position:fixed;left:13px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;background:rgba(6,6,10,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.07);padding:10px 9px;border-radius:18px;z-index:20}
.sw{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.sw:hover{transform:scale(1.25)}
.sw.ac{border-color:#fff;transform:scale(1.1)}
/* Sidebar */
#bar{position:fixed;right:13px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;background:rgba(6,6,10,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.07);padding:10px 9px;border-radius:18px;z-index:20;align-items:center;min-width:46px}
.slbl{font-size:9px;color:#2a2a35;text-align:center;letter-spacing:.4px;text-transform:uppercase;width:100%}
.sb{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:#777;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center}
.sb:hover{background:rgba(255,255,255,.13);color:#fff}
.sb.on{background:rgba(255,255,255,.17);border-color:rgba(255,255,255,.3);color:#fff}
.row{display:flex;gap:4px}
.div{width:26px;height:1px;background:rgba(255,255,255,.07);margin:2px 0}
.lb{width:20px;height:20px;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:#444;cursor:pointer;font-size:9px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center}
.lb:hover{background:rgba(255,255,255,.11)}
.lb.ac{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.32);color:#fff}
/* Legend */
#leg{position:fixed;bottom:13px;left:50%;transform:translateX(-50%);display:flex;gap:16px;background:rgba(6,6,10,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.07);padding:7px 18px;border-radius:12px;z-index:20;pointer-events:none;flex-wrap:wrap;justify-content:center}
.lg{font-size:10px;color:#2e2e38}
/* Loading */
#load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#09090d;z-index:200;gap:13px;transition:opacity .6s}
#load.gone{opacity:0;pointer-events:none}
.spin{width:30px;height:30px;border:2.5px solid rgba(255,255,255,.07);border-top-color:#50dc82;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#ltxt{font-size:12px;color:#3a3a45}
#wm{
  position:fixed;
  bottom:10px;
  right:14px;
  font-size:11px;
  color:rgba(255,255,255,0.25);
  font-weight:500;
  letter-spacing:.5px;
  pointer-events:none;
  z-index:999;
}
</style>
</head>
<body>

<div id="load"><div class="spin"></div><div id="ltxt">Loading MediaPipe…</div></div>
<div id="wrap"><canvas id="cv"></canvas></div>

<div id="hud">
  <span class="hlbl">mode</span>
  <span id="badge" class="badge bi">IDLE</span>
  <span id="hcnt">no hand</span>
  <span id="repind">⏵ replaying…</span>
</div>

<div id="pal"></div>

<div id="bar">
  <div class="slbl">layer</div>
  <div class="row">
    <div class="lb ac" id="lb0" onclick="setLyr(0)">1</div>
    <div class="lb" id="lb1" onclick="setLyr(1)">2</div>
    <div class="lb" id="lb2" onclick="setLyr(2)">3</div>
  </div>
  <div class="div"></div>
  <div class="slbl">size</div>
  <div class="row">
    <div class="sb on" id="sz4" onclick="setSz(4,'sz4')">S</div>
    <div class="sb" id="sz8" onclick="setSz(8,'sz8')">M</div>
  </div>
  <div class="row">
    <div class="sb" id="sz14" onclick="setSz(14,'sz14')">L</div>
    <div class="sb" id="sz22" onclick="setSz(22,'sz22')">XL</div>
  </div>
  <div class="div"></div>
  <div class="sb" onclick="undo()" title="Undo">↩</div>
  <div class="sb" onclick="clearAll()" title="Clear all">✕</div>
  <div class="div"></div>
  <div class="sb on" id="bgbtn" onclick="toggleBg()" title="Camera">📷</div>
  <div class="sb" onclick="doReplay()" title="Replay">⏵</div>
  <div class="sb" onclick="savePNG()" title="Export">💾</div>
</div>

<div id="leg">
  <span class="lg">☝️ Index = Draw</span>
  <span class="lg">✌️ Two fingers = Erase</span>
  <span class="lg">🤌 Pinch = Grab</span>
  <span class="lg">🤏🤏 Both pinch = Scale/Rotate</span>
  <span class="lg">✊ Hold fist = Undo</span>
</div>

<video id="vid" autoplay muted playsinline style="display:none"></video>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════════════
const cv = document.getElementById('cv')
const ctx = cv.getContext('2d')
const vid = document.getElementById('vid')
const badgeEl = document.getElementById('badge')
const hcntEl = document.getElementById('hcnt')
const repindEl = document.getElementById('repind')
let W = 0, H = 0

function resize() {
  const mw = window.innerWidth - 118, mh = window.innerHeight - 56
  if (mw / (4/3) <= mh) { W = ~~mw; H = ~~(mw * 3/4) }
  else { H = ~~mh; W = ~~(mh * 4/3) }
  cv.width = W; cv.height = H
}
resize()
window.addEventListener('resize', resize)

// ═══════════════════════════════════════════════════════════════
//  CONFIG & PALETTE
// ═══════════════════════════════════════════════════════════════
const PALETTE = ['#ffffff','#f94c4c','#ff9c20','#ffe040','#4fe89a','#00e5ff','#5aafff','#b060ff','#ff5cba','#111111']
let curColor = '#ffffff', brushSz = 4, showBg = true

const palEl = document.getElementById('pal')
PALETTE.forEach(c => {
  const s = document.createElement('div')
  s.className = 'sw' + (c === curColor ? ' ac' : '')
  s.style.background = c
  s.onclick = () => {
    curColor = c
    document.querySelectorAll('.sw').forEach(x => x.classList.remove('ac'))
    s.classList.add('ac')
  }
  palEl.appendChild(s)
})

function setSz(n, id) {
  brushSz = n
  document.querySelectorAll('[id^=sz]').forEach(b => b.classList.remove('on'))
  document.getElementById(id).classList.add('on')
}
function toggleBg() {
  showBg = !showBg
  document.getElementById('bgbtn').classList.toggle('on', showBg)
}

// ═══════════════════════════════════════════════════════════════
//  LAYERS & STROKES
// ═══════════════════════════════════════════════════════════════
// Each stroke: { id, col, pts: [{x,y,w,t}] }
const layers = [{ strokes: [], v: true }, { strokes: [], v: true }, { strokes: [], v: true }]
let actL = 0, idCtr = 0, curStroke = null

function setLyr(n) {
  actL = n
  document.querySelectorAll('.lb').forEach((b, i) => b.classList.toggle('ac', i === n))
}
function allStrokes() { return layers.flatMap(l => l.strokes) }
function undo() {
  if (curStroke) { curStroke = null; return }
  for (let i = layers.length - 1; i >= 0; i--) {
    if (layers[i].strokes.length > 0) { layers[i].strokes.pop(); return }
  }
}
function clearAll() {
  layers.forEach(l => l.strokes = [])
  curStroke = null; grabbing = false; grabbedIds.clear(); particles = []
}

// ═══════════════════════════════════════════════════════════════
//  MATH UTILS
// ═══════════════════════════════════════════════════════════════
function d2(a, b) { return (a.x - b.x) ** 2 + (a.y - b.y) ** 2 }
function dist(a, b) { return Math.sqrt(d2(a, b)) }
function toC(lm) { return { x: (1 - lm.x) * W, y: lm.y * H } }
function fUp(lm, tip, pip) { return lm[tip].y < lm[pip].y }

// ═══════════════════════════════════════════════════════════════
//  LANDMARK SMOOTHING  (5-frame moving average)
// ═══════════════════════════════════════════════════════════════
const SMOOTH_N = 5
const lmHist = [[], []]

function smoothLM(lm, hi) {
  const h = lmHist[hi]
  h.push(lm)
  if (h.length > SMOOTH_N) h.shift()
  const n = h.length
  return lm.map((_, i) => ({
    x: h.reduce((s, f) => s + f[i].x, 0) / n,
    y: h.reduce((s, f) => s + f[i].y, 0) / n,
    z: h.reduce((s, f) => s + f[i].z, 0) / n
  }))
}

// ═══════════════════════════════════════════════════════════════
//  GESTURE DETECTION
// ═══════════════════════════════════════════════════════════════
function gesture(lm) {
  if (dist(lm[4], lm[8]) < 0.055) return 'grab'
  const i = fUp(lm,8,6), m = fUp(lm,12,10), r = fUp(lm,16,14), p = fUp(lm,20,18)
  if (!i && !m && !r && !p) return 'fist'
  if (i && m && !r && !p)   return 'erase'
  if (i && !m && !r && !p)  return 'draw'
  return 'idle'
}

// ═══════════════════════════════════════════════════════════════
//  VELOCITY + DEPTH → STROKE WIDTH
// ═══════════════════════════════════════════════════════════════
let ldPos = null, ldT = null

function calcWidth(pos, base, z) {
  const now = performance.now()
  let w = base
  if (ldPos && ldT) {
    const dt = Math.max(now - ldT, 1)
    const spd = dist(ldPos, pos) / dt
    // slower = thicker, faster = thinner
    const vf = Math.max(0.35, Math.min(1.9, 0.85 / (spd * 0.45 + 0.45)))
    // closer to camera (more negative z) = slightly thicker
    const zf = Math.max(0.65, Math.min(1.35, 1 - z * 2.5))
    w = base * vf * zf
  }
  ldPos = { ...pos }; ldT = now
  return w
}

// ═══════════════════════════════════════════════════════════════
//  CHAIKIN STROKE SMOOTHING
// ═══════════════════════════════════════════════════════════════
function chaikin(pts, passes = 2) {
  let p = pts
  for (let pass = 0; pass < passes; pass++) {
    if (p.length < 3) break
    const s = [p[0]]
    for (let i = 0; i < p.length - 1; i++) {
      const a = p[i], b = p[i+1]
      s.push({ x: a.x*.75+b.x*.25, y: a.y*.75+b.y*.25, w: (a.w+b.w)/2, t: a.t })
      s.push({ x: a.x*.25+b.x*.75, y: a.y*.25+b.y*.75, w: (a.w+b.w)/2, t: a.t })
    }
    s.push(p[p.length-1]); p = s
  }
  return p
}

// ═══════════════════════════════════════════════════════════════
//  VARIABLE-WIDTH STROKE RENDERER  (filled quads + end-caps)
// ═══════════════════════════════════════════════════════════════
function drawVar(c, pts, col, glow) {
  if (!pts || pts.length === 0) return
  c.save()
  if (glow) { c.shadowColor = col; c.shadowBlur = 14 }
  c.fillStyle = col
  if (pts.length === 1) {
    c.beginPath(); c.arc(pts[0].x, pts[0].y, pts[0].w / 2, 0, Math.PI*2); c.fill()
    c.restore(); return
  }
  for (let i = 0; i < pts.length - 1; i++) {
    const p = pts[i], q = pts[i+1]
    const dx = q.x - p.x, dy = q.y - p.y
    const len = Math.sqrt(dx*dx + dy*dy)
    if (len < 0.4) continue
    const nx = -dy/len, ny = dx/len, r1 = p.w/2, r2 = q.w/2
    c.beginPath()
    c.moveTo(p.x+nx*r1, p.y+ny*r1); c.lineTo(q.x+nx*r2, q.y+ny*r2)
    c.lineTo(q.x-nx*r2, q.y-ny*r2); c.lineTo(p.x-nx*r1, p.y-ny*r1)
    c.closePath(); c.fill()
    c.beginPath(); c.arc(p.x, p.y, r1, 0, Math.PI*2); c.fill()
  }
  const l = pts[pts.length-1]
  c.beginPath(); c.arc(l.x, l.y, l.w/2, 0, Math.PI*2); c.fill()
  c.restore()
}

// ═══════════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════════
let particles = []
function emitParts(x, y, col, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.PI*2*i/n + Math.random()*.5, sp = 2 + Math.random()*4
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 1, dec: .034+Math.random()*.03, sz: brushSz*.4+Math.random()*brushSz*.6, col })
  }
}
function tickParts() {
  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vx*=.91; p.vy*=.91; p.life-=p.dec }
  particles = particles.filter(p => p.life > 0)
}

// ═══════════════════════════════════════════════════════════════
//  INK TRAIL
// ═══════════════════════════════════════════════════════════════
let trail = []
const TRAIL_MS = 380

// ═══════════════════════════════════════════════════════════════
//  FIST HOLD UNDO
// ═══════════════════════════════════════════════════════════════
let fistT = null
const FIST_MS = 900

// ═══════════════════════════════════════════════════════════════
//  ERASE
// ═══════════════════════════════════════════════════════════════
let erasePos = null
function eraseAt(x, y) {
  const r2 = (brushSz * 4) ** 2
  for (const l of layers) l.strokes = l.strokes.filter(s => !s.pts.some(p => d2(p, {x,y}) < r2))
}

// ═══════════════════════════════════════════════════════════════
//  GRAB & TWO-HAND TRANSFORM
// ═══════════════════════════════════════════════════════════════
let grabbing = false, grabCenter = null
let grabbedIds = new Set(), grabOffsets = new Map()
let twoActive = false, twoInitDist = 0, twoInitAngle = 0, twoSnaps = new Map()

// ═══════════════════════════════════════════════════════════════
//  REPLAY
// ═══════════════════════════════════════════════════════════════
let repMode = false, repSaved = null, repStart = 0, repAll = []

function doReplay() {
  const all = layers.flatMap(l => l.strokes).filter(s => s.pts.length > 1 && s.pts[0].t != null)
  if (!all.length) return
  const minT = Math.min(...all.map(s => s.pts[0].t))
  repAll = all.map(s => ({
    id: s.id, col: s.col,
    pts: s.pts.map(p => ({ x: p.x, y: p.y, w: p.w, t: p.t - minT }))
  }))
  repSaved = layers.map(l => l.strokes.slice())
  layers.forEach(l => l.strokes = [])
  repStart = performance.now(); repMode = true
  repindEl.classList.add('on')
}

function tickReplay() {
  if (!repMode) return
  const el = (performance.now() - repStart) * 1.6
  for (const rs of repAll) {
    let s = layers[0].strokes.find(x => x.id === rs.id)
    if (!s && rs.pts.length > 0 && rs.pts[0].t <= el) {
      s = { id: rs.id, col: rs.col, pts: [] }
      layers[0].strokes.push(s)
    }
    if (s) {
      const toAdd = rs.pts.slice(s.pts.length).filter(p => p.t <= el)
      s.pts.push(...toAdd)
    }
  }
  const maxT = repAll.length ? Math.max(...repAll.flatMap(s => s.pts.map(p => p.t))) : 0
  if (el > maxT + 800) {
    repMode = false; repindEl.classList.remove('on')
    layers.forEach((l, i) => l.strokes = repSaved[i])
  }
}

// ═══════════════════════════════════════════════════════════════
//  EXPORT PNG
// ═══════════════════════════════════════════════════════════════
function savePNG() {
  const oc = document.createElement('canvas'); oc.width = W; oc.height = H
  const oc2 = oc.getContext('2d')
  oc2.fillStyle = '#09090d'; oc2.fillRect(0, 0, W, H)
  for (const l of layers) if (l.v) for (const s of l.strokes) drawVar(oc2, s.pts, s.col, false)
  const a = document.createElement('a'); a.href = oc.toDataURL('image/png'); a.download = 'handdraw.png'; a.click()
}

// ═══════════════════════════════════════════════════════════════
//  MODE + BADGE
// ═══════════════════════════════════════════════════════════════
let mode = 'idle', prevMode = 'idle'
const BADGE_CLASS = { idle: 'bi', draw: 'bd', erase: 'be', grab: 'bg' }
function setBadge() {
  badgeEl.className = 'badge ' + (BADGE_CLASS[mode] || 'bi')
  badgeEl.textContent = mode.toUpperCase()
}

// ═══════════════════════════════════════════════════════════════
//  FINALIZE CURRENT STROKE
// ═══════════════════════════════════════════════════════════════
function finalize(smooth) {
  if (!curStroke) return
  if (curStroke.pts.length > 1) {
    if (smooth) curStroke.pts = chaikin(curStroke.pts, 2)
    layers[actL].strokes.push(curStroke)
  }
  curStroke = null
}

// ═══════════════════════════════════════════════════════════════
//  PROCESS ONE FRAME  (called with pre-smoothed landmarks)
// ═══════════════════════════════════════════════════════════════
function process(lm0, lm1, n) {
  const g = gesture(lm0)
  const tip = toC(lm0[8]), thm = toC(lm0[4]), mid = toC(lm0[12])
  const pinch = { x: (tip.x+thm.x)/2, y: (tip.y+thm.y)/2 }

  // Fist hold undo
  if (g === 'fist') {
    if (!fistT) fistT = performance.now()
    else if (performance.now() - fistT > FIST_MS) { undo(); fistT = null }
  } else { fistT = null }

  mode = (g === 'fist') ? 'idle' : g
  setBadge()

  // ─ DRAW
  if (mode === 'draw') {
    grabbing = false; grabbedIds.clear(); grabOffsets.clear(); erasePos = null
    if (prevMode !== 'draw') { emitParts(tip.x, tip.y, curColor); ldPos = null; ldT = null }
    const w = calcWidth(tip, brushSz, lm0[8].z)
    if (!curStroke) {
      curStroke = { id: idCtr++, col: curColor, pts: [{ ...tip, w, t: performance.now() }] }
    } else {
      const last = curStroke.pts[curStroke.pts.length-1]
      if (dist(last, tip) > 3) curStroke.pts.push({ ...tip, w, t: performance.now() })
    }
    trail.push({ ...tip, t: Date.now() })

  // ─ ERASE
  } else if (mode === 'erase') {
    ldPos = null; ldT = null; finalize(false)
    grabbing = false; grabbedIds.clear(); twoActive = false
    erasePos = { x: (tip.x+mid.x)/2, y: (tip.y+mid.y)/2 }
    eraseAt(erasePos.x, erasePos.y)

  // ─ GRAB / TWO-HAND TRANSFORM
  } else if (mode === 'grab') {
    ldPos = null; ldT = null; erasePos = null; finalize(false)

    // Two-hand scale + rotate when second hand is also pinching
    if (n >= 2 && lm1 && grabbedIds.size > 0 && gesture(lm1) === 'grab') {
      const q = { x: (toC(lm1[4]).x+toC(lm1[8]).x)/2, y: (toC(lm1[4]).y+toC(lm1[8]).y)/2 }
      const cd = dist(pinch, q), ca = Math.atan2(q.y-pinch.y, q.x-pinch.x)
      if (!twoActive) {
        twoActive = true; twoInitDist = cd; twoInitAngle = ca; twoSnaps.clear()
        for (const s of allStrokes()) {
          if (grabbedIds.has(s.id)) twoSnaps.set(s.id, s.pts.map(p => ({ x: p.x, y: p.y })))
        }
      } else {
        const scale = twoInitDist > 0 ? cd / twoInitDist : 1
        const dA = ca - twoInitAngle
        const ctr = { x: (pinch.x+q.x)/2, y: (pinch.y+q.y)/2 }
        for (const s of allStrokes()) {
          if (!grabbedIds.has(s.id)) continue
          const snap = twoSnaps.get(s.id); if (!snap) continue
          for (let i = 0; i < s.pts.length; i++) {
            const ox = snap[i].x - ctr.x, oy = snap[i].y - ctr.y
            const r = Math.sqrt(ox*ox + oy*oy) * scale
            const a = Math.atan2(oy, ox) + dA
            s.pts[i].x = ctr.x + r*Math.cos(a)
            s.pts[i].y = ctr.y + r*Math.sin(a)
          }
        }
      }
    } else {
      twoActive = false
      // Single-hand grab
      if (!grabbing) {
        grabbing = true; grabCenter = { ...pinch }
        grabbedIds.clear(); grabOffsets.clear()
        const r2 = (Math.min(W,H) * 0.11) ** 2
        for (const s of allStrokes()) {
          if (s.pts.some(p => d2(p, pinch) < r2)) {
            grabbedIds.add(s.id)
            grabOffsets.set(s.id, s.pts.map(p => ({ dx: p.x-pinch.x, dy: p.y-pinch.y })))
          }
        }
      } else if (grabbedIds.size > 0) {
        for (const s of allStrokes()) {
          if (!grabbedIds.has(s.id)) continue
          const off = grabOffsets.get(s.id)
          s.pts.forEach((p, i) => { p.x = pinch.x+off[i].dx; p.y = pinch.y+off[i].dy })
        }
        grabCenter = { ...pinch }
      } else {
        grabCenter = { ...pinch }
      }
    }

  // ─ IDLE / OTHER
  } else {
    ldPos = null; ldT = null; erasePos = null
    grabbing = false; grabbedIds.clear(); twoActive = false
    finalize(true)
  }

  prevMode = mode
}

// ═══════════════════════════════════════════════════════════════
//  HAND SKELETON RENDERER
// ═══════════════════════════════════════════════════════════════
const CONN = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]]
const TIPS = new Set([4,8,12,16,20])

function drawHand(lm) {
  ctx.save()
  ctx.strokeStyle = 'rgba(255,255,255,.18)'; ctx.lineWidth = 1.1
  for (const [a,b] of CONN) {
    const pa = toC(lm[a]), pb = toC(lm[b])
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke()
  }
  for (let i = 0; i < 21; i++) {
    const p = toC(lm[i])
    ctx.beginPath(); ctx.arc(p.x, p.y, TIPS.has(i) ? 4 : 2.5, 0, Math.PI*2)
    ctx.fillStyle = TIPS.has(i) ? 'rgba(255,255,255,.82)' : 'rgba(255,255,255,.38)'; ctx.fill()
  }
  ctx.restore()
}

// ═══════════════════════════════════════════════════════════════
//  CURSOR & TRAIL RENDERER
// ═══════════════════════════════════════════════════════════════
function drawCursor(lm) {
  const tip = toC(lm[8]), thm = toC(lm[4]), mid = toC(lm[12])

  if (mode === 'draw') {
    const now = Date.now()
    trail = trail.filter(p => now - p.t < TRAIL_MS)
    for (let i = 0; i < trail.length; i++) {
      const age = (now - trail[i].t) / TRAIL_MS
      ctx.save(); ctx.globalAlpha = (1-age) * .38; ctx.fillStyle = curColor
      ctx.beginPath(); ctx.arc(trail[i].x, trail[i].y, (brushSz*.5)*(1-age*.6), 0, Math.PI*2); ctx.fill(); ctx.restore()
    }
    ctx.save()
    ctx.strokeStyle = curColor; ctx.lineWidth = 2; ctx.shadowColor = curColor; ctx.shadowBlur = 14
    ctx.beginPath(); ctx.arc(tip.x, tip.y, brushSz/2 + 4, 0, Math.PI*2); ctx.stroke()
    ctx.restore()

  } else if (mode === 'erase' && erasePos) {
    ctx.save()
    ctx.strokeStyle = 'rgba(255,80,80,.7)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4])
    ctx.beginPath(); ctx.arc(erasePos.x, erasePos.y, brushSz*4, 0, Math.PI*2); ctx.stroke()
    ctx.restore()

  } else if (mode === 'grab') {
    const cx = (tip.x+thm.x)/2, cy = (tip.y+thm.y)/2, has = grabbedIds.size > 0
    ctx.save()
    ctx.beginPath(); ctx.moveTo(thm.x,thm.y); ctx.lineTo(tip.x,tip.y)
    ctx.strokeStyle = has ? 'rgba(240,168,40,.65)' : 'rgba(255,255,255,.28)'; ctx.lineWidth = 2; ctx.stroke()
    ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI*2)
    ctx.strokeStyle = has ? '#f0a828' : 'rgba(255,255,255,.32)'; ctx.lineWidth = 2
    if (has) { ctx.shadowColor = '#f0a828'; ctx.shadowBlur = 18 }
    ctx.stroke()
    if (!has) {
      ctx.setLineDash([4,6]); ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = 1
      ctx.beginPath(); ctx.arc(cx, cy, Math.min(W,H)*.11, 0, Math.PI*2); ctx.stroke()
    }
    ctx.restore()
  }

  // Fist hold progress arc
  if (fistT) {
    const prog = Math.min(1, (performance.now() - fistT) / FIST_MS)
    const p = toC(lm[0])
    ctx.save(); ctx.strokeStyle = '#ff5858'; ctx.lineWidth = 3; ctx.shadowColor = '#ff5858'; ctx.shadowBlur = 10
    ctx.beginPath(); ctx.arc(p.x, p.y, 22, -Math.PI/2, -Math.PI/2 + prog*Math.PI*2); ctx.stroke()
    ctx.globalAlpha = .12; ctx.fillStyle = '#ff5858'
    ctx.beginPath(); ctx.arc(p.x, p.y, 22, 0, Math.PI*2); ctx.fill()
    ctx.restore()
  }
}

// ═══════════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function render(lm0, lm1) {
  ctx.clearRect(0, 0, W, H)

  // Background: camera or solid
  if (showBg && vid.readyState >= 2) {
    ctx.save(); ctx.scale(-1,1); ctx.translate(-W,0)
    ctx.drawImage(vid, 0, 0, W, H); ctx.restore()
    ctx.fillStyle = 'rgba(0,0,0,.2)'; ctx.fillRect(0, 0, W, H)
  } else {
    ctx.fillStyle = '#0d0d12'; ctx.fillRect(0, 0, W, H)
  }

  // Layers
  for (const l of layers) {
    if (!l.v) continue
    for (const s of l.strokes) drawVar(ctx, s.pts, s.col, grabbedIds.has(s.id))
  }

  // Live stroke
  if (curStroke && curStroke.pts.length > 0) drawVar(ctx, curStroke.pts, curStroke.col, true)

  // Particles
  tickParts()
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = p.life * .75; ctx.fillStyle = p.col
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI*2); ctx.fill(); ctx.restore()
  }

  // Hands
  if (lm0) { drawHand(lm0); drawCursor(lm0) }
  if (lm1)   drawHand(lm1)
}

// ═══════════════════════════════════════════════════════════════
//  MEDIAPIPE CALLBACK
// ═══════════════════════════════════════════════════════════════
function onResults(res) {
  tickReplay()
  const lms = res.multiHandLandmarks || [], n = lms.length

  // Reset smoothing history when hands disappear
  if (n < 2) lmHist[1] = []
  if (n === 0) lmHist[0] = []

  // Pre-smooth once per frame
  const sm0 = lms[0] ? smoothLM(lms[0], 0) : null
  const sm1 = lms[1] ? smoothLM(lms[1], 1) : null

  hcntEl.textContent = n === 0 ? 'no hand' : n === 1 ? '1 hand' : '2 hands'

  if (n === 0) {
    mode = 'idle'; setBadge()
    finalize(true); fistT = null; grabbing = false; trail = []
    render(null, null); return
  }

  if (!repMode) process(sm0, sm1, n)
  render(sm0, sm1)
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
document.getElementById('ltxt').textContent = 'Loading model…'

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` })
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.55 })
hands.onResults(onResults)

hands.initialize()
  .then(() => {
    document.getElementById('ltxt').textContent = 'Starting camera…'
    startCam()
  })
  .catch(e => { document.getElementById('ltxt').textContent = '✕ ' + e.message })

async function startCam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
    })
    vid.srcObject = stream; await vid.play()
    document.getElementById('load').classList.add('gone')
    let busy = false
    const loop = async () => {
      if (!busy && vid.readyState >= 2) {
        busy = true
        try { await hands.send({ image: vid }) } catch(e) {}
        busy = false
      }
      requestAnimationFrame(loop)
    }
    loop()
  } catch(e) {
    document.getElementById('ltxt').textContent = '⚠ Camera access denied'
  }



}
